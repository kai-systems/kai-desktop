name: Release

on:
  pull_request:
  workflow_dispatch:
    inputs:
      verbump:
        description: Version bump to apply before releasing
        required: true
        default: patch
        type: choice
        options:
          - none
          - major
          - minor
          - patch

concurrency:
  group: release-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    if: ${{ github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.22.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm lint

      - run: pnpm type-check

      - run: pnpm build

  pr-mac-build:
    if: ${{ github.event_name == 'pull_request' }}
    needs: checks
    runs-on: macos-26
    permissions:
      contents: read
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: "false"
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.22.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm build:mac

  prepare-release:
    if: ${{ github.event_name == 'workflow_dispatch' }}
    needs: checks
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Require default branch
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          REF_NAME: ${{ github.ref_name }}
          REF_TYPE: ${{ github.ref_type }}
        run: |
          if [ "$REF_TYPE" != "branch" ]; then
            echo "workflow_dispatch must run from a branch ref." >&2
            exit 1
          fi

          if [ "$REF_NAME" != "$DEFAULT_BRANCH" ]; then
            echo "workflow_dispatch releases are only allowed from ${DEFAULT_BRANCH}, not ${REF_NAME}." >&2
            exit 1
          fi

      - name: Bump package version
        if: ${{ inputs.verbump != 'none' }}
        run: npm version "${{ inputs.verbump }}" --no-git-tag-version

      - name: Resolve release version
        id: version
        run: |
          version="$(node -p "require('./package.json').version")"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v$version" >> "$GITHUB_OUTPUT"

      - name: Commit package version bump
        if: ${{ inputs.verbump != 'none' }}
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json

          if git diff --cached --quiet; then
            echo "package.json did not change after version bump." >&2
            exit 1
          fi

          git commit -m "release: v${VERSION}"
          git push origin "HEAD:${DEFAULT_BRANCH}"

      - name: Ensure release tag is new
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          git fetch --tags origin

          if git show-ref --verify --quiet "refs/tags/${TAG}"; then
            echo "Tag ${TAG} already exists." >&2
            exit 1
          fi

      - name: Create and push release tag
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          git tag "$TAG"
          git push origin "$TAG"

  publish-release:
    if: ${{ github.event_name == 'workflow_dispatch' }}
    needs: prepare-release
    runs-on: macos-26
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ github.token }}
      # Code signing — electron-builder reads these automatically
      CSC_LINK: ${{ secrets.CSC_LINK }}
      CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
      # Notarization — electron-builder reads these automatically
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
    outputs:
      asset_name: ${{ steps.artifact.outputs.name }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare-release.outputs.tag }}

      - uses: pnpm/action-setup@v4
        with:
          version: 10.22.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm build:mac

      - name: Verify Swift helper binary
        run: |
          APP_PATH="$(find dist/mac-arm64 -maxdepth 1 -name '*.app' -type d | head -n 1)"
          HELPER="$APP_PATH/Contents/Resources/bin/LocalMacosHelper"

          if [ ! -x "$HELPER" ]; then
            echo "ERROR: LocalMacosHelper binary not found or not executable at $HELPER" >&2
            exit 1
          fi

          echo "Helper binary: $(ls -la "$HELPER")"
          echo "Architectures: $(lipo -archs "$HELPER")"
          echo "Code signature:"
          codesign -dvv "$HELPER" 2>&1

          # Verify the helper can run and report permissions (basic smoke test)
          RESULT=$("$HELPER" permissions 2>&1)
          echo "Permissions check output: $RESULT"

          if ! echo "$RESULT" | python3 -c "import sys,json; d=json.load(sys.stdin); assert d.get('ok') is True"; then
            echo "ERROR: LocalMacosHelper permissions check failed" >&2
            exit 1
          fi

          echo "✓ LocalMacosHelper binary verified"

      - name: Verify code signature
        run: |
          APP_PATH="$(find dist/mac-arm64 -maxdepth 1 -name '*.app' -type d | head -n 1)"
          if [ -z "$APP_PATH" ]; then
            echo "ERROR: No .app bundle found in dist/mac-arm64/" >&2
            exit 1
          fi

          echo "Verifying signature: $APP_PATH"
          codesign --verify --deep --strict --verbose=2 "$APP_PATH"

          echo ""
          echo "Checking notarization staple:"
          xcrun stapler validate "$APP_PATH" || echo "Warning: staple not found (notarization may still be processing)"

      - name: Locate DMG artifact
        id: artifact
        run: |
          artifact_path="$(find dist -maxdepth 1 -type f -name '*.dmg' | head -n 1)"

          if [ -z "$artifact_path" ]; then
            echo "No DMG artifact found in dist/." >&2
            exit 1
          fi

          # Strip version and arch for a stable download URL (e.g. Kai-1.0.10-arm64.dmg -> Kai.dmg)
          name="$(basename "$artifact_path")"
          stable_name="$(echo "$name" | sed 's/-[0-9][0-9.]*-[a-z0-9]*\./\./')"
          stable_path="dist/${stable_name}"
          mv "$artifact_path" "$stable_path"

          echo "path=$stable_path" >> "$GITHUB_OUTPUT"
          echo "name=$stable_name" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        env:
          TAG: ${{ needs.prepare-release.outputs.tag }}
        run: |
          gh release create "$TAG" "${{ steps.artifact.outputs.path }}" \
            --generate-notes \
            --title "$TAG" \
            --verify-tag

  update-cask:
    if: ${{ github.event_name == 'workflow_dispatch' }}
    needs:
      - prepare-release
      - publish-release
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Download DMG and compute SHA256
        id: sha
        env:
          ASSET_NAME: ${{ needs.publish-release.outputs.asset_name }}
          TAG: ${{ needs.prepare-release.outputs.tag }}
        run: |
          gh release download "$TAG" \
            --pattern "$ASSET_NAME" \
            --repo "${{ github.repository }}" \
            --output kai.dmg
          sha=$(shasum -a 256 kai.dmg | awk '{print $1}')
          echo "sha256=$sha" >> "$GITHUB_OUTPUT"
          echo "asset_name_url=${ASSET_NAME// /%20}" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/homebrew-tap
          token: ${{ secrets.HOMEBREW_DISPATCH_TOKEN }}
          path: homebrew-tap

      - name: Update cask formula
        working-directory: homebrew-tap
        env:
          ASSET_NAME_URL: ${{ steps.sha.outputs.asset_name_url }}
          REPOSITORY: ${{ github.repository }}
          SHA256: ${{ steps.sha.outputs.sha256 }}
          VERSION: ${{ needs.prepare-release.outputs.version }}
        run: |
          mkdir -p Casks
          cat > Casks/kai.rb << RUBY
          cask "kai" do
            version "${VERSION}"
            sha256 "${SHA256}"

            url "https://github.com/${REPOSITORY}/releases/download/v#{version}/${ASSET_NAME_URL}"
            name "Kai"
            desc "Kai desktop client"
            homepage "https://github.com/${REPOSITORY}"

            app "Kai.app"

            zap trash: "~/.kai"
          end
          RUBY

      - name: Commit and push cask update
        working-directory: homebrew-tap
        env:
          VERSION: ${{ needs.prepare-release.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/kai.rb

          if git diff --cached --quiet; then
            echo "Cask formula is already up to date."
            exit 0
          fi

          git commit -m "update kai cask to ${VERSION}"
          git push
